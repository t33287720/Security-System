services:

  # ── Security Worker (Python) ──────────────────────────────────
  # network_mode:host + privileged so ipset/iptables work on the host kernel
  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: security-system-worker
    network_mode: host            # accesses ES/MariaDB via localhost
    privileged: true              # required for ipset / iptables
    mem_limit: 512m
    environment:
      - TZ=Asia/Taipei
      - PYTHONUNBUFFERED=1
      - ES_HOST=${ES_HOST_WORKER}
      - ES_USER=elastic
      - ES_PASS=${ES_PASS}
      - MYSQL_HOST=127.0.0.1
      - MYSQL_PORT=3306
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASS=${MYSQL_PASS}
      - MYSQL_DB=CCT_Security
      - OLLAMA_URL=${OLLAMA_URL}
      - EMBED_URL=${EMBED_URL:-}
      - MANUAL_IPS=${MANUAL_IPS:-}
      - IPSET_NAME=${IPSET_NAME:-blacklistv4}
      - IPSET_FULL_NAME=${IPSET_FULL_NAME:-blackfulllistv4}
      - IPSET_WHITELIST_NAME=${IPSET_WHITELIST_NAME:-whitelistv4}
      - HOSTS_JSON_PATH=/app/config/security_hosts.json
    volumes:
      - ./config/security_hosts.json:/app/config/security_hosts.json:ro
      - /var/opt/Security-System/data:/app/data
    restart: unless-stopped

  # ── PHP Web ──────────────────────────────────────────────────
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: security-system-web
    mem_limit: 512m
    extra_hosts:
      - "host.docker.internal:host-gateway"   # 讓容器可以連回主機的 MariaDB / ES
    environment:
      - MYSQL_HOST=host.docker.internal
      - MYSQL_PORT=3306
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASS=${MYSQL_PASS}
      - MYSQL_DB=CCT_Security
      - ES_HOST=${ES_HOST_WEB}
      - ES_USER=elastic
      - ES_PASS=${ES_PASS}
    ports:
      - "${WEB_PORT:-80}:80"
    volumes:
      - ./web:/var/www/html/GAIsecurity
      - /var/opt/Security-System/data/eval/output:/var/www/html/GAIsecurity/api/eval/output:ro
    networks:
      - security-system
    restart: unless-stopped

  # ── Vulnerability Scan Agent (Python) ──────────────────────────
  # 主動弱點掃描：nmap + searchsploit + LLM(gemma3:27b) triage
  # 常駐迴圈，每天 VULN_SCAN_DAILY_TIME（預設凌晨00:00）自動執行一次掃描
  # 手動立即掃描一次：docker compose run --rm -e VULN_SCAN_RUN_ONCE=true vuln-agent
  vuln-agent:
    build:
      context: ./vuln-agent
      dockerfile: Dockerfile
    container_name: security-system-vuln-agent
    network_mode: host             # 掃描 host 自身網卡介面（含對外IP）
    environment:
      - TZ=Asia/Taipei
      - PYTHONUNBUFFERED=1
      - MYSQL_HOST=127.0.0.1
      - MYSQL_PORT=3306
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASS=${MYSQL_PASS}
      - MYSQL_DB=CCT_Security
      - OLLAMA_URL=${OLLAMA_URL}
      - VULN_SCAN_TARGETS=${VULN_SCAN_TARGETS:-127.0.0.1}
      - VULN_SCAN_DAILY_TIME=${VULN_SCAN_DAILY_TIME:-00:00}
      - VULN_REACT_MAX_ROUNDS=${VULN_REACT_MAX_ROUNDS:-2}
      - CODE_SCAN_ENABLED=${CODE_SCAN_ENABLED:-true}
      - CODE_SCAN_PATHS=${CODE_SCAN_PATHS:-worker,web,vuln-agent}
      - CODE_SCAN_ROOT=/app/repo
      - CODE_REACT_MAX_ROUNDS=${CODE_REACT_MAX_ROUNDS:-2}
    volumes:
      # 原始碼掃描（gitleaks/semgrep）唯讀掛載：僅掛載原始碼目錄，
      # 不掛載 repo 根目錄（避免暴露 .env / .git / config/security_hosts.json）
      - ./worker:/app/repo/worker:ro
      - ./web:/app/repo/web:ro
      - ./vuln-agent:/app/repo/vuln-agent:ro
    restart: unless-stopped

networks:
  security-system:
    driver: bridge
