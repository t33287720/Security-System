# Logstash pipeline — Filebeat input → Zeek / syslog filter → Elasticsearch
# ES_PASS is injected from docker-compose environment

input {
  beats {
    port => 5044
  }
}

filter {

  # ── Zeek conn.log ─────────────────────────────────────────
  if [event][module] == "zeek" and [event][dataset] == "zeek.connection" {

    ruby {
      code => '
        require "ipaddr"

        msg_line = event.get("[zeek][connection][original]") || event.get("message")
        if msg_line
          msg = msg_line.split("\t")
          if msg.size >= 8
            event.set("zeek_ts",      msg[0])
            event.set("zeek_uid",     msg[1])
            event.set("src_ip",       msg[2])
            event.set("src_port",     msg[3])
            event.set("dst_ip",       msg[4])
            event.set("dst_port",     msg[5])
            event.set("zeek_proto",   msg[6])
            event.set("zeek_service", msg[7])

            begin
              IPAddr.new(msg[2])
              IPAddr.new(msg[4])
            rescue
              next
            end
          end
        end
      '
    }

    mutate { remove_field => ["message"] }

  } else {

    # ── Non-Zeek logs ─────────────────────────────────────────
    grok {
      match => {
        "message" => [
          "^%{IP:client_ip} - - \[%{HTTPDATE:timestamp}\] \"%{WORD:http_method} %{URIPATHPARAM:request}(?:\?%{NOTSPACE:query_string})? HTTP/%{NUMBER:http_version}\" %{NUMBER:response_code} %{NUMBER:bytes} \"%{DATA:referrer}\" \"%{DATA:user_agent}\"",
          "Unable to negotiate with %{IP:client_ip} port %{NUMBER:src_port}: %{GREEDYDATA}",
          "Connection closed by %{IP:client_ip} port %{NUMBER:src_port} \[preauth\]",
          "SRC=%{IP:src_ip}",
          "src_ip=%{IP:src_ip_alt}",
          "client %{IP:client_ip_alt}",
          "from %{IP:client_ip_alt}",
          "\"ip\":\"%{IP:client_ip_alt}\"",
          "ip=%{IP:client_ip_alt}",
          "remote_addr=%{IP:client_ip_alt}"
        ]
      }
    }

    ruby {
      code => "
        require 'ipaddr'

        def valid_ip(ip)
          begin IPAddr.new(ip); true rescue; false end
        end

        ip_candidates = [
          event.get('client_ip'),
          event.get('src_ip'),
          event.get('src_ip_alt'),
          event.get('client_ip_alt')
        ].compact

        client_ip = ip_candidates.find { |ip| valid_ip(ip) }
        client_ip ? event.set('client_ip', client_ip) : event.remove('client_ip')
      "
    }

    mutate { remove_field => ["src_ip", "src_ip_alt", "client_ip_alt", "ident"] }
  }
}

output {
  elasticsearch {
    hosts    => ["http://elasticsearch:9200"]
    user     => "elastic"
    password => "${ES_PASS}"
    index    => "filebeat-%{+YYYY.MM.dd}"
  }
}
